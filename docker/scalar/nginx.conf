server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /openapi.yaml {
        add_header Cache-Control "no-store";
        default_type application/yaml;
        try_files /openapi.yaml =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
