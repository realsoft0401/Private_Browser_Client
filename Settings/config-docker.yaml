server:
  host: 0.0.0.0
  port: 3300

docker:
  api_url: http://127.0.0.1:2375

discovery:
  enabled: true
  broadcast_address: 255.255.255.255
  port: 43000
  interval_seconds: 15
  magic: PRIVATE_BROWSER_CLIENT_DISCOVERY
  protocol_version: 1
  group: default
  advertise_host: ""
  advertise_base_url: ""

heartbeat:
  enabled: true
  # 当前正式口径下，节点发现只认 UDP beacon。
  # heartbeat 必须保留，但它只负责告诉 Node“这台已知 Client 还活着”，不参与发现。
  server_base_url: http://127.0.0.1:3400
  interval_seconds: 15

node_register:
  enabled: true
  # node_register 用于 bind 成功后由 Node 下发唯一设备身份并写入本地 JSON。
  # 如果 Client 部署在其它机器，必须改成真实 Node 地址，不能继续沿用 127.0.0.1。
  server_base_url: http://127.0.0.1:3400
  main_account_id: "906090119"
  node_name: ""
  edge_api_key: private-browser-edge-key

swagger:
  enabled: true
  path: /swagger

slot_runtime:
  enabled: true
  image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-amd64
  command: []
  container_name_prefix: private-browser-slot
  auto_pull_missing_image: true
  enable_vnc: true
  internal_cdp_port: 9222
  internal_vnc_port: 5900
  host_cdp_base_port: 9200
  host_vnc_base_port: 9100
