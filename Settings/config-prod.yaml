name: private-browser-client
mode: prod
version: 0.1.7
server:
  host: 0.0.0.0
  port: 3300
  read_timeout_seconds: 15
  write_timeout_seconds: 15
docker:
  api_url: http://127.0.0.1:2375
status_sync:
  enabled: true
  interval_seconds: 5
  watchdog_seconds: 15
  stale_seconds: 30
discovery:
  enabled: true
  broadcast_address: 255.255.255.255
  port: 43000
  interval_seconds: 5
  magic: PRIVATE_BROWSER_CLIENT_DISCOVERY
  protocol_version: 1
  group: default
  advertise_host: ""
  advertise_base_url: ""
