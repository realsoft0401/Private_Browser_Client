<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slot WebVNC</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #111;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .toolbar {
        height: 44px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 14px;
        background: #1d1d1f;
        border-bottom: 1px solid #333;
        box-sizing: border-box;
      }
      .title {
        min-width: 0;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }
      .status {
        font-size: 13px;
        color: #f0c36a;
      }
      .status.ok {
        color: #6ee7a8;
      }
      button {
        height: 30px;
        border: 1px solid #555;
        border-radius: 6px;
        background: #2d2d30;
        color: #fff;
        cursor: pointer;
      }
      #viewer {
        width: 100%;
        height: calc(100vh - 44px);
        overflow: hidden;
        background: #000;
      }
      #viewer > div {
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <header class="toolbar">
      <div class="title" id="title">slot webvnc</div>
      <div class="status" id="status">等待连接</div>
      <button id="reconnect" type="button">重连</button>
    </header>
    <main id="viewer"></main>

    <script type="module">
      import RFB from "/vendor/novnc/core/rfb.js";

      const params = new URLSearchParams(window.location.search);
      const slotId = (params.get("slot") || "").trim();
      const viewer = document.getElementById("viewer");
      const title = document.getElementById("title");
      const status = document.getElementById("status");
      const reconnect = document.getElementById("reconnect");
      let rfb = null;

      function setStatus(text, ok = false) {
        status.textContent = text;
        status.classList.toggle("ok", ok);
      }

      async function connect() {
        if (!slotId) {
          setStatus("缺少 slot");
          return;
        }
        if (rfb) {
          rfb.disconnect();
          rfb = null;
        }

        title.textContent = "slot: " + slotId;
        viewer.innerHTML = "";
        setStatus("读取连接信息");

        try {
          const response = await fetch(`/api/v1/edge/slots/${encodeURIComponent(slotId)}/vnc-info`);
          const payload = await response.json();
          if (!payload?.data?.wsUrl) {
            throw new Error(payload?.message || "未返回 wsUrl");
          }

          const current = new RFB(viewer, payload.data.wsUrl);
          rfb = current;
          current.scaleViewport = true;
          current.clipViewport = false;
          current.resizeSession = false;
          current.background = "#000";
          current.showDotCursor = true;

          current.addEventListener("connect", () => {
            if (rfb !== current) return;
            setStatus("已连接", true);
            current.focus({ preventScroll: true });
          });
          current.addEventListener("disconnect", (event) => {
            if (rfb !== current) return;
            setStatus(event.detail?.clean ? "已断开" : "连接失败");
          });
          current.addEventListener("credentialsrequired", () => {
            setStatus("VNC 请求密码，请检查 slot 运行镜像参数");
          });
          current.addEventListener("securityfailure", () => {
            setStatus("VNC 安全握手失败");
          });
        } catch (error) {
          setStatus(`连接准备失败: ${error?.message || "未知错误"}`);
        }
      }

      reconnect.addEventListener("click", connect);
      connect();
    </script>
  </body>
</html>
