      properties:
        enabled:
          type: boolean
          example: true
        type:
          type: string
          description: 第一版仅支持 clash-verge。
          example: clash-verge
        image:
          type: string
          description: 可选。浏览器环境包下一次 run 使用的 Docker 镜像；running 环境实际变化后会后台重建容器。
          example: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
        mode:
          type: string
          enum: [rule, global, direct]
          description: 可选。和 configBase64 同时传入时，后端先解码 YAML，再覆盖顶层 mode；单独传入时只修改现有 proxy/clash.yaml 顶层 mode。
          example: global
        configBase64:
          type: string
          description: 代理 YAML 原文的 Base64 编码。避免长 YAML 在 JSON 字符串中被截断或转义出错。
          example: bW9kZTogcnVsZQptaXhlZC1wb3J0OiA3ODk3Cg==
