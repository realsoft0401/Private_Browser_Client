openapi: 3.0.3
info:
  title: Private Browser Client Edge Node API
  version: 0.2.0
  description: |
    Private_Browser_Client 是单机边缘执行服务，只负责当前宿主机上的 Docker、本机 slot 资源位、
    browser-env 正式生命周期能力和受控的 Node 登记协同。

    它不是用户中心、节点管理中心或调度平台，不维护其它 Client 列表，也不自生成中心 clientId。
    文档里出现的 `clientId` 统一表示 Node Server 分配的中心节点身份；Client 侧只允许在受控本机接口里
    临时展示 Node 返回结果，并允许把上次结果写入本地 JSON 留痕；但这个 JSON 只是缓存，不是正式中心身份，
    更不允许把它当作本机自造设备号。

    除 `/health` 外，当前业务接口统一返回 HTTP 200 + JSON `code/message/data` 包装。
servers:
  - url: /
    description: 当前打开 Swagger 页面的 Edge 服务入口；Try it out 会跟随当前页面 Host。
paths:
  /health:
    get:
      summary: Client health check
      description: 返回当前 Client 的本机健康事实，只表达 healthy/unhealthy，不表达 Server 侧 offline/stale。
      responses:
        '200':
          description: Health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealth'
  /api/v1/edge/device-info:
    get:
      summary: Get local device info
      description: 返回当前 Client 所在机器的最小设备事实摘要。
      responses:
        '200':
          description: Device info response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDeviceInfo'
  /api/v1/edge/docker/status:
    get:
      summary: Get docker status
      description: |
        返回当前 Client 本机 Docker 的最小可用性摘要。
        这是只读接口，不返回完整镜像或容器明细。
      responses:
        '200':
          description: Docker status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDockerStatus'
  /api/v1/edge/docker/images:
    get:
      summary: List docker images
      description: |
        返回当前 Client 本机 Docker 镜像摘要列表。
        这是只读接口，不做镜像策略判断。
      responses:
        '200':
          description: Docker images response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDockerImages'
  /api/v1/edge/docker/containers:
    get:
      summary: List project docker containers
      description: |
        返回当前项目相关的本机 Docker 容器摘要列表。
        只返回本项目相关容器，不暴露宿主机无关容器。
      responses:
        '200':
          description: Docker containers response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDockerContainers'
  /api/v1/edge/docker/pull-image:
    post:
      summary: Pull docker image (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台在本机执行 Docker pull。
        最终结果必须继续订阅 `/api/v1/edge/tasks/{taskId}/events`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullDockerImageRequest'
      responses:
        '200':
          description: Pull image task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/docker/remove-image:
    post:
      summary: Remove docker image (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台在本机删除指定 Docker 镜像。
        最终结果必须继续订阅 `/api/v1/edge/tasks/{taskId}/events`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveDockerImageRequest'
      responses:
        '200':
          description: Remove image task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/containers/{slotId}/start:
    post:
      summary: Start slot container (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台启动指定 slot 对应的本机容器。
        这是运维诊断接口，不等价于 browser-env 业务主入口。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      responses:
        '200':
          description: Container start task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/containers/{slotId}/stop:
    post:
      summary: Stop slot container (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台停止指定 slot 对应的本机容器。
        这是运维诊断接口，不等价于 browser-env stop。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerStopRequest'
      responses:
        '200':
          description: Container stop task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/containers/{slotId}/restart:
    post:
      summary: Restart slot container (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台重启指定 slot 对应的本机容器。
        这是运维诊断接口，不替代 browser-env run/stop。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerRestartRequest'
      responses:
        '200':
          description: Container restart task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/node-registration:
    get:
      summary: Get node registration status
      description: 返回当前 Client 对 Node 暴露的发现摘要，实时查询 Node 当前是否已存在这台 Client 的中心登记结果，并带回本地 JSON 缓存留痕。
      responses:
        '200':
          description: Node registration status response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNodeRegistrationStatus'
  /api/v1/edge/node-registration/assign:
    post:
      summary: Accept assigned clientId from node server
      description: |
        接收 Node Server 已经完成 bind 后反向下发的中心 clientId/accountId，并写入本地
        `data/node-registration.json` 留痕。调用方必须带 `X-Edge-API-Key`。
      parameters:
        - name: X-Edge-API-Key
          in: header
          required: true
          schema:
            type: string
          example: private-browser-edge-key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignNodeRegistrationRequest'
      responses:
        '200':
          description: Assign result response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNodeRegistrationAssign'
  /api/v1/edge/slots:
    get:
      summary: List slots
      description: 列出当前 Client 已创建的全部 slot 当前态。
      responses:
        '200':
          description: Slot list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSlotList'
    post:
      summary: Create slot
      description: 按指定 slotId 在当前 Client 上创建一个 slot 当前态记录。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSlotRequest'
      responses:
        '201':
          description: Slot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSlot'
  /api/v1/edge/slots/{slotId}:
    get:
      summary: Get slot
      description: 查询单个 slot 当前态。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      responses:
        '200':
          description: Slot response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSlot'
    delete:
      summary: Destroy slot
      description: 销毁指定 slot。当前骨架阶段仅允许 waiting 状态直接销毁。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DestroySlotRequest'
      responses:
        '200':
          description: Destroy slot response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGeneric'
  /api/v1/edge/slots/{slotId}/reinit:
    post:
      summary: Reinitialize slot
      description: 把 slot 收回 waiting 初始态。当前要求 slot 必须已经脱离运行关系。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      responses:
        '200':
          description: Reinit slot response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSlot'
  /api/v1/edge/slots/{slotId}/vnc-info:
    get:
      summary: Get slot VNC info
      description: 返回 slot 视角的 VNC/noVNC 连接信息。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      responses:
        '200':
          description: Slot VNC info response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSlotVNCInfo'
  /api/v1/edge/slots/{slotId}/cdp-info:
    get:
      summary: Get slot CDP info
      description: 返回 slot 视角的 CDP 连接信息。
      parameters:
        - $ref: '#/components/parameters/SlotID'
      responses:
        '200':
          description: Slot CDP info response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSlotCDPInfo'
  /api/v1/edge/browser-envs:
    get:
      summary: List browser envs
      description: |
        查询当前 Client 本机的浏览器环境包索引列表。
        这是只读摘要接口，返回分页、简单统计和环境包列表，不返回代理明文、
        fingerprint raw 或 browser-data 登录态内容。
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
          example: "906090001"
        - name: rpaType
          in: query
          required: false
          schema:
            type: string
          example: tk
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [created, running, stopped, backed_up, deleted, error]
          example: running
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          example: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          example: 20
      responses:
        '200':
          description: Browser env list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBrowserEnvList'
    post:
      summary: Create browser env
      description: |
        在当前 Client 本机创建一个新的浏览器环境包。
        当前按 old 设计方式执行：`profile.json` 是唯一详细配置文档，不保存运行状态；
        创建成功后主状态进入 `created`，不自动 run。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrowserEnvRequest'
      responses:
        '200':
          description: Browser env created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCreateBrowserEnv'
  /api/v1/edge/browser-envs/{envId}/run:
    post:
      summary: Run browser env (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台按 envId 读取本机环境包资产，
        执行 slot 容器切换、浏览器容器启动和正式状态收口。

        这条接口不是同步最终结果接口。调用方必须继续订阅
        `/api/v1/edge/tasks/{taskId}/events`，观察 queued/running/completed/failed
        事件，才能确认本次 run 的最终结论。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunBrowserEnvRequest'
      responses:
        '200':
          description: Run task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/{envId}/stop:
    post:
      summary: Stop browser env
      description: |
        按环境包停止当前 Client 本机浏览器容器，并同步运行态摘要。
        当前按 old 和 project 口径，stop 只围绕 SQLite 索引和 container.json 收口，
        不重新读取 profile/proxy/fingerprint 这类完整资产材料。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopBrowserEnvRequest'
      responses:
        '200':
          description: Stop browser env response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStopBrowserEnv'
  /api/v1/edge/browser-envs/{envId}:
    get:
      summary: Get browser env detail
      description: |
        查询单个浏览器环境包详情，组合 SQLite 索引、profile、binding、container、
        proxy 摘要和一致性检查结果。
        该接口不返回代理明文和 fingerprint raw。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Browser env detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBrowserEnvDetail'
  /api/v1/edge/tasks/{taskId}:
    get:
      summary: Get task detail
      description: |
        查询当前 Client 进程内的短期任务摘要。
        这不是 SSE 接口；如果任务仍在执行中，调用方仍应继续订阅
        `/api/v1/edge/tasks/{taskId}/events`。
      parameters:
        - $ref: '#/components/parameters/TaskID'
      responses:
        '200':
          description: Task detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskDetail'
  /api/v1/edge/tasks/{taskId}/events:
    get:
      summary: Subscribe task SSE events (SSE)
      description: |
        SSE 事件流接口，返回 `text/event-stream`。

        只要某个业务接口说明“立即返回 `taskId/eventsUrl`”，调用方就应该通过这条统一入口
        继续订阅任务过程，而不是把接单响应误解成最终结果。

        当前事件流会先补发该任务已记录的历史事件，再继续推送后续事件；
        典型事件包括 `task.progress`、`task.completed`、`task.failed`。
      parameters:
        - $ref: '#/components/parameters/TaskID'
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/edge/browser-envs/{envId}/proxy:
    patch:
      summary: Update browser env proxy
      description: |
        修改指定环境包的代理配置。
        只有当这次修改触发明显多阶段、耗时较长的运行侧重新验证时，才返回 `taskId/eventsUrl` 并使用 SSE；
        如果只是快速完成文件落盘与摘要更新，同步 HTTP 已足够表达结果，则直接返回同步结果。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBrowserEnvProxyRequest'
      responses:
        '200':
          description: Proxy update result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseUpdateBrowserEnvProxy'
                  - $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/{envId}/proxy-mode:
    patch:
      summary: Update browser env proxy mode
      description: |
        只切换代理配置里的 mode，不上传整份代理配置。
        只有当运行中环境触发明显多阶段重建时，才返回 `taskId/eventsUrl` 并使用 SSE；
        否则同步返回结果。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBrowserEnvProxyModeRequest'
      responses:
        '200':
          description: Proxy mode update result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseUpdateBrowserEnvProxyMode'
                  - $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/{envId}/backup:
    post:
      summary: Backup browser env (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台生成标准备份包，
        并在校验成功后释放本机运行目录和本次运行关系。

        调用方必须继续订阅 `/api/v1/edge/tasks/{taskId}/events`，
        以确认备份是否真正完成，而不是只看接单成功。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Backup task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/{envId}/restore:
    post:
      summary: Restore browser env (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台从本机 `backupPath`
        恢复环境目录。

        restore 只认当前 Client 本机受控 backup tar，不接受上传文件；
        成功后不自动 run。最终恢复结果必须通过 SSE 事件确认。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Restore task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/{envId}/revalidate:
    post:
      summary: Revalidate browser env (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台对异常环境包执行受控重新校验，
        把它从异常态恢复到可再次尝试运行的待启动状态，但不启动容器。

        最终校验结论必须通过 `/api/v1/edge/tasks/{taskId}/events` 观察。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Revalidate task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/import-package:
    post:
      summary: Import browser env package (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台导入外部标准环境包。

        一个请求只允许一个 tar，一个 tar 只允许一个合法 `envId/` 根目录；
        导入成功后状态为 `created`，不自动 run。最终导入是否成功，必须通过 SSE 事件确认。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImportBrowserEnvPackageRequest'
      responses:
        '200':
          description: Import task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/{envId}/package:
    delete:
      summary: Delete browser env package (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台彻底删除当前节点上的环境包资产、
        登录态目录、已停止容器和 SQLite 索引。

        当前正式口径下不允许在 running 状态直接 delete，也不允许接口内部偷偷 stop。
        删除是否真正完成，必须通过 SSE 事件确认。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Delete task accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskAccepted'
  /api/v1/edge/browser-envs/{envId}/del:
    delete:
      summary: Delete browser env runtime image
      description: |
        只删除环境包关联的本机 Docker 运行镜像，不删除环境包目录、
        browser-data/profile、container.json 或 SQLite 索引。
        这是同步 HTTP 接口，不使用 SSE。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Delete browser env image response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDeleteBrowserEnvImage'
  /api/v1/edge/browser-envs/{envId}/cdp-test:
    get:
      summary: Test browser env CDP
      description: |
        基础 CDP 连通性诊断接口。
        只判断 CDP 自身是否可用，不判断 timezone 和代理出口。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Browser env CDP test response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBrowserEnvCDPTest'
components:
  parameters:
    SlotID:
      name: slotId
      in: path
      required: true
      schema:
        type: string
      example: slot001
    EnvID:
      name: envId
      in: path
      required: true
      schema:
        type: string
      example: 906090001_tk_324867594169356288
    TaskID:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      example: edge-task-run-001
  schemas:
    ApiResponseBase:
      type: object
      properties:
        code:
          type: integer
          example: 1000
        message:
          type: string
          example: success
    ApiResponseGeneric:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
    ApiResponseHealth:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
