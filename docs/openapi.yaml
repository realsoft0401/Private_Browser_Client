openapi: 3.0.3
info:
  title: Private Browser Client Edge API
  version: 0.2.0
  description: |
    Private_Browser_Client 当前定位为边缘服务，只暴露本机设备与本机 Docker 能力。
    用户、节点列表、设备归属、设备编号等中心控制能力应放到未来 Private_Browser_Server。
servers:
  - url: http://127.0.0.1:3300
    description: 本地开发环境
paths:
  /health:
    get:
      summary: 服务健康检查
      tags: [System]
      responses:
        '200':
          description: 服务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                ok: true
                service: private-browser-client
                mode: dev
                version: 0.1.0
                configFile: /path/to/Settings/config-dev.yaml
                dockerApi: http://127.0.0.1:2375
                statusSync:
                  enabled: true
                  workerRunning: true
                  restarts: 0
                  intervalSeconds: 5
                  watchdogSeconds: 15
                  staleSeconds: 30
                  lastStartedAt: 1779956193
                  lastHeartbeatAt: 1779956198
                  lastFinishedAt: 1779956198
                  lastSuccessAt: 1779956198
                  lastScannedCount: 1
                  lastUpdatedCount: 1
  /api/v1/edge/device-info:
    get:
      summary: 获取本机设备能力信息
      description: 请求本机 Docker Engine API 的 /_ping、/info、/version，返回本机设备和 Docker 能力摘要。不写数据库，不需要 nodeId。
      tags: [Edge]
      responses:
        '200':
          description: 本机设备能力
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceInfoSuccess'
              example:
                code: 1000
                message: success
                data:
                  deviceIp: 127.0.0.1
                  dockerApiUrl: http://127.0.0.1:2375
                  deviceOs: Docker Desktop
                  deviceArch: arm64
                  deviceRawArch: arm64
                  cpuCores: 8
                  memoryTotalBytes: 8321994752
                  dockerVersion: 29.5.2
                  dockerApiVersion: "1.54"
                  composeVersion: ""
                  lastDockerStatus: available
                  lastDockerMessage: ok
                  lastImagesCount: 25
                  lastContainersCount: 11
                  checkedAt: 1779956193
  /api/v1/edge/docker/status:
    get:
      summary: 获取本机 Docker 状态
      description: 返回本机 Docker daemon 可用性、镜像数量和容器数量。完整镜像/容器列表后续通过独立接口扩展。
      tags: [Edge]
      responses:
        '200':
          description: 本机 Docker 状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerStatusSuccess'
              example:
                code: 1000
                message: success
                data:
                  dockerApiUrl: http://127.0.0.1:2375
                  status: available
                  message: ok
                  imagesCount: 25
                  containersCount: 11
                  checkedAt: 1779956193
  /api/v1/edge/docker/images:
    get:
      summary: 获取本机 Docker 镜像列表
      description: 请求本机 Docker Engine API 的 /images/json，返回镜像 ID、标签、摘要、创建时间和大小等摘要字段。不写数据库，不需要 nodeId。
      tags: [Edge]
      responses:
        '200':
          description: 本机镜像列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerImagesSuccess'
              example:
                code: 1000
                message: success
                data:
                  - id: sha256:example
                    repoTags: ["crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64"]
                    repoDigests: []
                    created: 1779956193
                    size: 123456789
                    virtualSize: 123456789
                    sharedSize: -1
                    containers: -1
  /api/v1/edge/docker/containers:
    get:
      summary: 获取本项目相关 Docker 容器列表
      description: 请求本机 Docker Engine API 的 /containers/json?all=true，但只返回 Private_Browser_Client 项目相关容器：edge-service 表示边缘服务自身容器，browser-env 表示浏览器环境容器。不写数据库，不需要 nodeId。
      tags: [Edge]
      responses:
        '200':
          description: 本机容器列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerContainersSuccess'
              example:
                code: 1000
                message: success
                data:
                  - id: abc123
                    names: ["/bv-318275706305908736-tk-318578131780767744"]
                    image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                    imageId: sha256:example
                    command: "/start.sh"
                    created: 1779956193
                    ports:
                      - ip: 0.0.0.0
                        privatePort: 5900
                        publicPort: 5901
                        type: tcp
                    labels:
                      bv.project: private-browser-client
                      bv.role: browser-env
                      bv.envId: 318275706305908736_tk_318578131780767744
                      bv.userId: "318275706305908736"
                      bv.rpaType: tk
                    state: running
                    status: Up 10 minutes
                    projectRole: browser-env
                    envId: 318275706305908736_tk_318578131780767744
                    userId: "318275706305908736"
                    rpaType: tk
  /api/v1/edge/docker/pull-image:
    post:
      summary: 拉取本机 Docker 镜像（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台调用本机 Docker Engine API 的 /images/create 拉取镜像，并通过 /api/v1/edge/tasks/{taskId}/events 推送 Docker pull 层进度。该接口会改变本机 Docker 状态，但不写数据库。
      tags: [Edge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullImageRequest'
            examples:
              browserArm64:
                summary: 拉取 crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                value:
                  image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
              explicitTag:
                summary: 镜像名和 tag 分开传
                value:
                  image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge
                  tag: 1.1-arm64
      responses:
        '200':
          description: SSE 任务已创建。最终 Docker 拉取事件列表会出现在任务 done 事件 result 中。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: docker_pull_image
                  status: queued
                  resourceType: docker_image
                  resourceId: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: Docker 镜像拉取任务已创建
  /api/v1/edge/docker/remove-image:
    post:
      summary: 删除本机 Docker 镜像（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台调用本机 Docker Engine API 删除镜像；最终删除/解绑结果通过任务 done 事件 result 返回。该接口会改变本机 Docker 状态，请谨慎使用。
      tags: [Edge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveImageRequest'
            example:
              image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
              force: false
              noPrune: false
      responses:
        '200':
          description: SSE 任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: docker_remove_image
                  status: queued
                  resourceType: docker_image
                  resourceId: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: Docker 镜像删除任务已创建
  /api/v1/edge/containers/{id}/start:
    post:
      summary: 启动本机 Docker 容器（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台调用本机 Docker Engine API 的 /containers/{id}/start。该接口只操作本机 Docker，不写数据库，不需要 nodeId。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/ContainerId'
      responses:
        '200':
          description: SSE 任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: docker_container_start
                  status: queued
                  resourceType: docker_container
                  resourceId: abc123
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: Docker 容器启动任务已创建
  /api/v1/edge/containers/{id}/stop:
    post:
      summary: 停止本机 Docker 容器（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台调用本机 Docker Engine API 的 /containers/{id}/stop。请求体可为空；不传 timeoutSeconds 时默认等待 10 秒。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/ContainerId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerActionRequest'
            example:
              timeoutSeconds: 10
      responses:
        '200':
          description: SSE 任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: docker_container_stop
                  status: queued
                  resourceType: docker_container
                  resourceId: abc123
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: Docker 容器停止任务已创建
  /api/v1/edge/containers/{id}/restart:
    post:
      summary: 重启本机 Docker 容器（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台调用本机 Docker Engine API 的 /containers/{id}/restart。请求体可为空；不传 timeoutSeconds 时默认等待 10 秒。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/ContainerId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerActionRequest'
            example:
              timeoutSeconds: 10
      responses:
        '200':
          description: SSE 任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: docker_container_restart
                  status: queued
                  resourceType: docker_container
                  resourceId: abc123
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: Docker 容器重启任务已创建
  /api/v1/edge/tasks/{taskId}:
    get:
      summary: 查询边缘任务详情
      description: 查询 SSE 任务详情。当前任务暂存在内存中，服务重启后不会恢复；它用于 Docker pull/remove、容器 start/stop/restart、浏览器环境 run/stop/delete、running 状态 proxy/proxy-mode 重建等动作接口。
      tags: [Edge]
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeTaskSuccess'
  /api/v1/edge/tasks/{taskId}/events:
    get:
      summary: 订阅边缘任务 SSE 事件（SSE）
      description: SSE 事件流接口，返回 text/event-stream。会先补发任务历史事件，再推送 queued/running/progress/heartbeat/done/error 等事件；done 事件的 data.result 视具体任务而定。
      tags: [Edge]
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE 事件流
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/edge/browser-envs:
    get:
      summary: 查询本机浏览器环境包列表
      description: 从本机 SQLite browser_envs 索引表查询环境包摘要。默认排除 status=deleted；如需查看回收站，显式传 status=deleted。
      tags: [Edge]
      parameters:
        - name: userId
          in: query
          required: false
          description: 按用户 ID 筛选，必须是数字字符串。
          schema:
            type: string
          example: "318275706305908736"
        - name: rpaType
          in: query
          required: false
          description: 按 RPA 类型筛选。
          schema:
            type: string
            enum: [tk, fb, ins, yt, x, other]
          example: tk
        - name: status
          in: query
          required: false
          description: 按环境包生命周期状态筛选；不传时默认排除 deleted。
          schema:
            type: string
            enum: [created, running, stopped, backed_up, deleted, archived, error]
          example: created
        - name: page
          in: query
          required: false
          description: 页码，默认 1。
          schema:
            type: integer
            default: 1
          example: 1
        - name: pageSize
          in: query
          required: false
          description: 每页数量，默认 20，最大 100。
          schema:
            type: integer
            default: 20
            maximum: 100
          example: 20
      responses:
        '200':
          description: 环境包列表和统计
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBrowserEnvSuccess'
              example:
                code: 1000
                message: success
                data:
                  total: 1
                  page: 1
                  pageSize: 20
                  byStatus:
                    created: 1
                  byRpaType:
                    tk: 1
                  items:
                    - envId: 318275706305908736_tk_918273645001
                      userId: "318275706305908736"
                      rpaType: tk
                      name: tk-browser-001
                      envSequence: 1
                      cdpPort: 8101
                      vncPort: 9101
                      vncUrl: vnc://127.0.0.1:9101
                      vncWsUrl: ws://127.0.0.1:3300/api/v1/edge/browser-envs/318275706305908736_tk_918273645001/vnc/ws
                      webVncUrl: http://127.0.0.1:3300/web-vnc.html?envId=318275706305908736_tk_918273645001
                      envPath: data/browser-envs/users/318275706305908736/tk/318275706305908736_tk_918273645001
                      status: running
                      containerName: bv-318275706305908736-tk-918273645001
                      containerStatus: running
                      monitorStatus: unknown
                      fingerprintRestored: false
                      hasBrowserData: true
                      createdAt: 1779956193
                      updatedAt: 1779956193
    post:
      summary: 创建本地浏览器环境包
      description: 接收服务端下发的浏览器环境配置，生成本地可迁移环境包文件。该接口不创建或启动 Docker 容器。
      tags: [Edge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrowserEnvRequest'
            example:
              userId: "318275706305908736"
              rpaType: tk
              name: tk-browser-001
              runtime:
                image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                startupUrl: about:blank
                shmSize: 1g
              environment:
                timezone: America/Toronto
                language: en-US
                screen:
                  width: 1366
                  height: 768
                  depth: 24
              proxy:
                enabled: true
                type: clash-verge
                mode: rule
                configBase64: bW9kZTogcnVsZQptaXhlZC1wb3J0OiA3ODk3Cg==
              fingerprint:
                backup: null
              metadata:
                description: TikTok browser env
      responses:
        '200':
          description: 环境包创建结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBrowserEnvSuccess'
              example:
                code: 1000
                message: success
                data:
                  envId: 318275706305908736_tk_918273645001
                  userId: "318275706305908736"
                  rpaType: tk
                  envSequence: 1
                  ports:
                    cdp: 8101
                    vnc: 9101
                  envPath: data/browser-envs/users/318275706305908736/tk/318275706305908736_tk_918273645001
                  files:
                    manifest: manifest.json
                    profile: profile.json
                    binding: binding.json
                    container: container.json
                    proxyConfig: proxy/clash.yaml
                    fingerprintSnapshot: fingerprint/snapshot.json
                    fingerprintBackup: fingerprint/backup.json
                    fingerprintRuntimeConfig: fingerprint/runtime-config.json
                    browserData: browser-data/profile
                  identityHash: sha256:xxx
                  configHash: sha256:xxx
                  createdAt: 1779956193
  /api/v1/edge/browser-envs/import-package:
    post:
      summary: 导入浏览器环境包
      description: 上传本服务备份生成的标准 .tar.gz 环境包，或同格式的外部备份包。导入会校验单根目录、manifest、标准文件和 checksums；默认保留原 envId，若本机已存在同名环境包则拒绝。导入后重新分配本机 envSequence/CDP/VNC，并把容器运行态重置为 created，下一次 run 会重新执行容器内 timezone 探测。
      tags: [Edge]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 标准环境包 .tar.gz 文件。
      responses:
        '200':
          description: 环境包导入结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportBrowserEnvPackageSuccess'
              example:
                code: 1000
                message: success
                data:
                  envId: 318275706305908736_tk_918273645001
                  userId: "318275706305908736"
                  rpaType: tk
                  envSequence: 2
                  ports:
                    cdp: 8102
                    vnc: 9102
                  envPath: data/browser-envs/users/318275706305908736/tk/318275706305908736_tk_918273645001
                  status: created
                  importedAt: 1779957193
        '409':
          description: 本机已存在同名 envId 或目标目录。
  /api/v1/edge/browser-envs/{envId}:
    get:
      summary: 获取本地浏览器环境包详情
      description: 从 SQLite 索引和本地环境包文件读取详情。响应包含 manifest/profile/binding/container、代理摘要、指纹摘要和一致性检查；不返回 proxy/clash.yaml 明文，也不返回 fingerprint raw。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      responses:
        '200':
          description: 环境包详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserEnvDetailSuccess'
              example:
                code: 1000
                message: success
                data:
                  index:
                    envId: 318275706305908736_tk_918273645001
                    userId: "318275706305908736"
                    rpaType: tk
                    name: tk-browser-001
                    envSequence: 1
                    cdpPort: 8101
                    vncPort: 9101
                    status: running
                    containerStatus: running
                    monitorStatus: unknown
                    fingerprintRestored: false
                    hasBrowserData: true
                    createdAt: 1779956193
                    updatedAt: 1779956193
                  manifest:
                    envId: 318275706305908736_tk_918273645001
                    userId: "318275706305908736"
                    rpaType: tk
                    envSequence: 1
                  profile:
                    name: tk-browser-001
                    runtime:
                      image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                      enableVnc: true
                    ports:
                      cdp: 8101
                      vnc: 9101
                  binding:
                    id: binding-318275706305908736-tk-918273645001
                    version: 1
                    locked: false
                    identityHash: sha256:xxx
                    configHash: sha256:xxx
                  proxy:
                    enabled: true
                    type: clash-verge
                    configPath: proxy/clash.yaml
                    configHash: sha256:xxx
                    configSizeBytes: 27
                  fingerprint:
                    snapshot:
                      ok: false
                    backup:
                      available: false
                      hasFingerprint: false
                    runtimeConfig:
                      available: false
                  consistency:
                    manifestMatchesIndex: true
                    identityHashMatches: true
                    proxyConfigExists: true
                    browserDataExists: true
                    errors: []
                  files:
                    manifest: manifest.json
                    profile: profile.json
                    binding: binding.json
                    container: container.json
                    proxyConfig: proxy/clash.yaml
                    fingerprintSnapshot: fingerprint/snapshot.json
                    fingerprintBackup: fingerprint/backup.json
                    fingerprintRuntimeConfig: fingerprint/runtime-config.json
                    browserData: browser-data/profile
                  vnc:
                    vncUrl: vnc://127.0.0.1:9101
                    vncWsUrl: ws://127.0.0.1:3300/api/v1/edge/browser-envs/318275706305908736_tk_918273645001/vnc/ws
                    webVncUrl: http://127.0.0.1:3300/web-vnc.html?envId=318275706305908736_tk_918273645001
    delete:
      summary: 彻底删除本地浏览器环境包（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台物理删除环境包目录，包括 manifest/profile/binding/proxy/fingerprint/browser-data/profile，删除关联的已停止 Docker 容器，并移除 SQLite browser_envs 索引记录。该操作无法通过 rebuild-index 找回；不会删除浏览器镜像，也不会自动停止 running 容器。如果环境包仍在 running，任务会失败并在 SSE error 事件中返回原因。前端必须在调用前提示用户谨慎操作、删除后无法恢复。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      responses:
        '200':
          description: SSE 任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: browser_env_delete
                  status: queued
                  resourceType: browser_env
                  resourceId: 318275706305908736_tk_918273645001
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: 浏览器环境删除任务已创建
  /api/v1/edge/browser-envs/{envId}/run:
    post:
      summary: 启动本地浏览器环境包（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台按 envId 读取本机环境包文件，创建或启动对应 Docker 浏览器容器。镜像、端口、代理、指纹和挂载都来自环境包；该接口不接受 Docker 参数透传。run 内部会等待浏览器/CDP、执行容器内 timezone 探测，必要时二次重建容器，因此必须通过 SSE 观察最终结果。如果 proxy/clash.yaml 启用了 tun.enable=true，创建容器前会检查宿主机 /dev/net/tun；存在时自动追加 NET_ADMIN 和 /dev/net/tun 设备挂载，不存在时不阻断 run，降级依赖 mixed-port + 浏览器代理链路。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunBrowserEnvRequest'
            example:
              forceRecreate: false
      responses:
        '200':
          description: SSE 任务已创建。最终 RunBrowserEnvResponse 会出现在任务 done 事件 result 中。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: browser_env_run
                  status: queued
                  resourceType: browser_env
                  resourceId: 318275706305908736_tk_918273645001
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: 浏览器环境启动任务已创建
  /api/v1/edge/browser-envs/{envId}/stop:
    post:
      summary: 停止本地浏览器环境包（SSE 任务）
      description: SSE 任务化接口。立即返回 taskId/eventsUrl，后台按 envId 停止环境包对应的本机 Docker 浏览器容器，并同步 container.json、manifest.lastRuntime 和 browser_envs 运行态字段。该接口不删除容器、镜像或 browser-data/profile 登录态目录。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopBrowserEnvRequest'
            example:
              timeoutSeconds: 10
      responses:
        '200':
          description: SSE 任务已创建。最终 StopBrowserEnvResponse 会出现在任务 done 事件 result 中。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartSuccess'
              example:
                code: 1000
                message: success
                data:
                  taskId: task_1770000000000000000_12345
                  taskType: browser_env_stop
                  status: queued
                  resourceType: browser_env
                  resourceId: 318275706305908736_tk_918273645001
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  message: 浏览器环境停止任务已创建
  /api/v1/edge/browser-envs/{envId}/backup:
    post:
      summary: 备份本地浏览器环境包
      description: 备份是状态变化动作：生成标准 .tar.gz 备份包到 data/browser-envs/users/{userId}/{rpaType}/，校验成功后删除关联的已停止 Docker 容器和 browser-envs 源环境目录，并把 SQLite 索引保留为 backed_up 资产状态。该接口不会删除浏览器镜像，不会删除 SQLite 索引，也不会自动停止 running 容器；running 时返回 409。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      responses:
        '200':
          description: 备份完成，环境资产转为 backed_up。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupBrowserEnvSuccess'
        '409':
          description: 环境包仍在运行中，或已经是备份状态。
  /api/v1/edge/browser-envs/{envId}/restore:
    post:
      summary: 从本机备份包恢复浏览器环境包
      description: 从 SQLite 索引记录的 backupPath 读取本机备份包，校验 checksum 后恢复 browser-envs/{envId} 环境目录，并把容器运行态重置为 created。该接口不启动 Docker；恢复成功后调用 run 执行 RPA。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      responses:
        '200':
          description: 恢复完成，环境包回到 created 状态。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreBrowserEnvSuccess'
        '409':
          description: 环境包不是备份状态，或备份包 checksum 不匹配。
  /api/v1/edge/browser-envs/{envId}/proxy:
    patch:
      summary: 修改环境包代理配置和运行镜像（SSE 任务）
      description: 修改 profile.proxy、proxy/clash.yaml，也可以通过 image 修改 profile.runtime.image。代理配置不是热更新，镜像变更也必须重建容器；如果环境包正在 running，接口会快速返回 restartQueued=true、taskId、eventsUrl，并通过 SSE 后台 forceRecreate 重建容器，让配置修改对用户无感知。代理配置变化会重算 binding.identityHash；仅 image 变化不会改变 identityHash。非 running 或未发生变更时不返回 taskId。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBrowserEnvProxyRequest'
            example:
              enabled: true
              type: clash-verge
              image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
              mode: global
              configBase64: bW9kZTogcnVsZQptaXhlZC1wb3J0OiA3ODk3Cg==
      responses:
        '200':
          description: 代理配置修改结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBrowserEnvProxySuccess'
              example:
                code: 1000
                message: success
                data:
                  envId: 318275706305908736_tk_318578131780767744
                  status: stopped
                  image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                  proxy:
                    enabled: true
                    type: clash-verge
                    mode: global
                    configPath: proxy/clash.yaml
                    configHash: sha256:775d8817bed8ec4f5275d2aaff66103d5490c665f9b85cafc6194cf463dcb595
                    configSizeBytes: 28
                  bindingVersion: 2
                  identityHash: sha256:c9439c86977482fa3b18e76696ad6428c61756970b9fc166afcb0fc75ef5cccb
                  changed: true
                  restartRequired: false
                  restartQueued: true
                  taskId: task_1770000000000000000_12345
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  restarted: false
                  updatedAt: 1779956993
  /api/v1/edge/browser-envs/{envId}/proxy-mode:
    patch:
      summary: 切换 Clash 代理模式（SSE 任务）
      description: 只修改 proxy/clash.yaml 顶层 mode 字段，支持 rule/global/direct。该接口属于代理配置修改能力，不是 run 参数；running 环境会快速返回 restartQueued=true、taskId、eventsUrl，并通过 SSE 后台 forceRecreate，重新执行容器内 timezone 探测。非 running 或未发生变更时不返回 taskId。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBrowserEnvProxyModeRequest'
            example:
              mode: global
      responses:
        '200':
          description: 代理模式修改结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBrowserEnvProxySuccess'
              example:
                code: 1000
                message: success
                data:
                  envId: 318275706305908736_tk_318578131780767744
                  status: running
                  image: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
                  proxy:
                    enabled: true
                    type: clash-verge
                    mode: global
                    configPath: proxy/clash.yaml
                    configHash: sha256:xxx
                    configSizeBytes: 4421
                  bindingVersion: 11
                  identityHash: sha256:xxx
                  changed: true
                  restartRequired: false
                  restartQueued: true
                  taskId: task_1770000000000000000_12345
                  eventsUrl: http://127.0.0.1:3300/api/v1/edge/tasks/task_1770000000000000000_12345/events
                  restarted: false
                  updatedAt: 1779957993
  /api/v1/edge/browser-envs/{envId}/cdp-test:
    get:
      summary: 测试浏览器环境包 CDP 连通性
      description: 基础诊断接口，只测试当前 running 环境包的 CDP 端口是否可用。测试步骤包括 /json/version、创建 target、连接 DevTools WebSocket、执行 Runtime.evaluate；不访问 timezone provider，也不判断代理出口。诊断失败时仍可能返回 code=1000，具体失败阶段在 data.stage/error 中。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      responses:
        '200':
          description: CDP 诊断结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserEnvCDPTestSuccess'
              example:
                code: 1000
                message: success
                data:
                  envId: 318275706305908736_tk_918273645001
                  cdpPort: 8101
                  endpoint: http://host.docker.internal:8101/
                  ok: true
                  stage: done
                  browser: Chrome/125.0.0.0
                  protocolVersion: '1.3'
                  webSocketUrl: ws://host.docker.internal:8101/devtools/page/ABC
                  runtimeResult: cdp-ok
                  testedAt: 1779956993
                  durationMs: 123
  /api/v1/edge/browser-envs/{envId}/vnc-info:
    get:
      summary: 获取浏览器版 VNC 连接信息
      description: 返回 envId 对应环境包的 VNC 端口、vnc:// 地址、WebSocket 地址和浏览器 Web VNC 页面地址。推荐前端使用 webVncUrl。
      tags: [Edge]
      parameters:
        - $ref: '#/components/parameters/BrowserEnvId'
      responses:
        '200':
          description: VNC 连接信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserEnvVNCInfoSuccess'
              example:
                code: 1000
                message: success
                data:
                  envId: 318275706305908736_tk_918273645001
                  vncPort: 9101
                  vncUrl: vnc://127.0.0.1:9101
                  wsUrl: ws://127.0.0.1:3300/api/v1/edge/browser-envs/318275706305908736_tk_918273645001/vnc/ws
                  webVncUrl: http://127.0.0.1:3300/web-vnc.html?envId=318275706305908736_tk_918273645001
components:
  parameters:
    ContainerId:
      name: id
      in: path
      required: true
      description: Docker 容器 ID 或容器名称。
      schema:
        type: string
      example: abc123
    BrowserEnvId:
      name: envId
      in: path
      required: true
      description: 浏览器环境包 ID。
      schema:
        type: string
      example: 318275706305908736_tk_918273645001
  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        service:
          type: string
          example: private-browser-client
        mode:
          type: string
          example: dev
        version:
          type: string
          example: 0.1.0
        configFile:
          type: string
          example: /path/to/Settings/config-dev.yaml
        dockerApi:
          type: string
          example: http://127.0.0.1:2375
        statusSync:
          $ref: '#/components/schemas/StatusSyncSnapshot'
    StatusSyncSnapshot:
      type: object
      description: 后台浏览器环境状态同步任务健康快照。哨兵只重启同步 Worker，不重启浏览器容器。
      properties:
        enabled:
          type: boolean
          example: true
        workerRunning:
          type: boolean
          example: true
        restarts:
          type: integer
          example: 0
        intervalSeconds:
          type: integer
          example: 5
        watchdogSeconds:
          type: integer
          example: 15
        staleSeconds:
          type: integer
          example: 30
        lastStartedAt:
          type: integer
          nullable: true
          example: 1779956193
        lastHeartbeatAt:
          type: integer
          nullable: true
          example: 1779956198
        lastFinishedAt:
          type: integer
          nullable: true
          example: 1779956198
        lastSuccessAt:
          type: integer
          nullable: true
          example: 1779956198
        lastError:
          type: string
          nullable: true
          example: docker api containers failed
        lastPanic:
          type: string
          nullable: true
          example: ""
        lastSkippedReason:
          type: string
          nullable: true
          example: lifecycle lock busy
        lastScannedCount:
          type: integer
          example: 1
        lastUpdatedCount:
          type: integer
          example: 1
    StandardSuccess:
      type: object
      properties:
        code:
          type: integer
          example: 1000
        message:
          type: string
          example: success
        data:
          nullable: true
    DeviceInfo:
      type: object
      properties:
        deviceIp:
          type: string
          example: 127.0.0.1
        dockerApiUrl:
          type: string
          example: http://127.0.0.1:2375
        deviceOs:
          type: string
          example: Docker Desktop
        deviceArch:
          type: string
          enum: [amd64, arm64, unknown]
          example: arm64
        deviceRawArch:
          type: string
          example: arm64
        cpuCores:
          type: integer
          example: 8
        memoryTotalBytes:
          type: integer
          example: 8321994752
        dockerVersion:
          type: string
          example: 29.5.2
        dockerApiVersion:
          type: string
          example: "1.54"
        composeVersion:
          type: string
          example: ""
        lastDockerStatus:
          type: string
          example: available
        lastDockerMessage:
          type: string
          example: ok
        lastImagesCount:
          type: integer
          example: 25
        lastContainersCount:
          type: integer
          example: 11
        checkedAt:
          type: integer
          example: 1779956193
    DockerStatus:
      type: object
      properties:
        dockerApiUrl:
          type: string
          example: http://127.0.0.1:2375
        status:
          type: string
          example: available
        message:
          type: string
          example: ok
        imagesCount:
          type: integer
          example: 25
        containersCount:
          type: integer
          example: 11
        checkedAt:
          type: integer
          example: 1779956193
    DockerImage:
      type: object
      properties:
        id:
          type: string
          example: sha256:example
        repoTags:
          type: array
          items:
            type: string
          example: ["crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64"]
        repoDigests:
          type: array
          items:
            type: string
          example: []
        created:
          type: integer
          example: 1779956193
        size:
          type: integer
          example: 123456789
        virtualSize:
          type: integer
          example: 123456789
        sharedSize:
          type: integer
          example: -1
        containers:
          type: integer
          example: -1
    DockerContainer:
      type: object
      properties:
        id:
          type: string
          example: abc123
        names:
          type: array
          items:
            type: string
          example: ["/browser-001"]
        image:
          type: string
          example: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
        imageId:
          type: string
          example: sha256:example
        command:
          type: string
          example: /start.sh
        created:
          type: integer
          example: 1779956193
        ports:
          type: array
          items:
            $ref: '#/components/schemas/DockerContainerPort'
        labels:
          type: object
          additionalProperties:
            type: string
        state:
          type: string
          example: running
        status:
          type: string
          example: Up 10 minutes
        projectRole:
          type: string
          enum: [edge-service, browser-env]
          description: 项目容器角色。edge-service 是 Private_Browser_Client 自身容器，browser-env 是浏览器环境容器。
          example: browser-env
        envId:
          type: string
          description: 浏览器环境容器对应的 envId；edge-service 为空。
          example: 318275706305908736_tk_318578131780767744
        userId:
          type: string
          description: 浏览器环境容器所属用户；edge-service 为空。
          example: "318275706305908736"
        rpaType:
          type: string
          description: 浏览器环境容器的 RPA 类型；edge-service 为空。
          example: tk
    DockerContainerPort:
      type: object
      properties:
        ip:
          type: string
          example: 0.0.0.0
        privatePort:
          type: integer
          example: 5900
        publicPort:
          type: integer
          example: 5901
        type:
          type: string
          example: tcp
    PullImageRequest:
      type: object
      required: [image]
      properties:
        image:
          type: string
          description: 镜像名，支持完整 registry 地址，例如 crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64。
          example: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
        tag:
          type: string
          description: 可选 tag；如果 image 已经带 tag，可以不传。
          example: latest
    RemoveImageRequest:
      type: object
      required: [image]
      properties:
        image:
          type: string
          description: 镜像 ID、repo:tag 或 digest。
          example: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
        force:
          type: boolean
          description: 是否强制删除。
          example: false
        noPrune:
          type: boolean
          description: 是否不清理未打标签的父层。
          example: false
    ContainerActionRequest:
      type: object
      properties:
        timeoutSeconds:
          type: integer
          nullable: true
          description: 停止或重启容器前等待的秒数；不传时默认 10 秒。
          example: 10
    ContainerActionResult:
      type: object
      properties:
        containerId:
          type: string
          example: abc123
        action:
          type: string
          enum: [start, stop, restart]
          example: start
        status:
          type: string
          enum: [success, not-modified]
          example: success
        message:
          type: string
          example: ok
        checkedAt:
          type: integer
          example: 1779956193
    CreateBrowserEnvRequest:
      type: object
      required: [userId, rpaType, name, runtime, environment, proxy]
      properties:
        userId:
          type: string
          description: 用户 ID，必须是数字字符串。
          example: "318275706305908736"
        rpaType:
          type: string
          enum: [tk, fb, ins, yt, x, other]
          example: tk
        name:
          type: string
          example: tk-browser-001
        runtime:
          $ref: '#/components/schemas/CreateBrowserEnvRuntime'
        environment:
          $ref: '#/components/schemas/CreateBrowserEnvEnvironment'
        proxy:
          $ref: '#/components/schemas/CreateBrowserEnvProxy'
        fingerprint:
          $ref: '#/components/schemas/CreateBrowserEnvFingerprint'
        metadata:
          $ref: '#/components/schemas/CreateBrowserEnvMetadata'
    CreateBrowserEnvRuntime:
      type: object
      required: [image]
      properties:
        image:
          type: string
          example: crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-arm64
        startupUrl:
          type: string
          default: about:blank
          example: about:blank
        shmSize:
          type: string
          default: 1g
          example: 1g
    CreateBrowserEnvEnvironment:
      type: object
      required: [timezone, language, screen]
      properties:
        timezone:
          type: string
          example: America/Toronto
        language:
          type: string
          example: en-US
        screen:
          $ref: '#/components/schemas/CreateBrowserEnvScreen'
    CreateBrowserEnvScreen:
      type: object
      required: [width, height]
      properties:
        width:
          type: integer
          example: 1366
        height:
          type: integer
          example: 768
        depth:
          type: integer
          default: 24
          example: 24
    CreateBrowserEnvProxy:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          example: true
        type:
          type: string
          enum: [clash-verge]
          example: clash-verge
        mode:
          type: string
          enum: [rule, global, direct]
          description: 可选。创建时写入 proxy/clash.yaml 顶层 mode；不传则保留 configBase64 原文中的 mode。
          example: rule
        configBase64:
          type: string
          description: Clash Verge YAML 原文的 Base64 编码；enabled=true 时必填。当前项目不兼容旧的明文 config 入参。
          example: bW9kZTogcnVsZQptaXhlZC1wb3J0OiA3ODk3Cg==
    CreateBrowserEnvFingerprint:
      type: object
      properties:
        backup:
          nullable: true
          description: 第一版可不传；后续可用于导入云端正式指纹备份。
    CreateBrowserEnvMetadata:
      type: object
      properties:
        description:
          type: string
          example: TikTok browser env
    CreateBrowserEnvResponse:
      type: object
      properties:
        envId:
          type: string
          example: 318275706305908736_tk_918273645001
        userId:
          type: string
          example: "318275706305908736"
        rpaType:
          type: string
          example: tk
        envSequence:
          type: integer
          example: 1
        ports:
          $ref: '#/components/schemas/CreateBrowserEnvPorts'
        envPath:
          type: string
          example: data/browser-envs/users/318275706305908736/tk/318275706305908736_tk_918273645001
        files:
          type: object
